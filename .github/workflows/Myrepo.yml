name: Run python
on: [push]
jobs:
  run-python:
      runs-on: windows-latest
      steps:
          - name: chechout repository
            uses: actions/checkout@v3
          - name: setup Python
            uses: actions/setup-python@v4
          - name: Install requests library
            run: pip install requests
          - name: Run python script
            run: python repos.py
        
